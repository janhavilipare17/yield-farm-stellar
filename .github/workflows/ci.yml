name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-contracts:
    name: Build Rust Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: wasm32-unknown-unknown
          override: true

      - name: Install Stellar CLI
        run: cargo install --locked stellar-cli --features opt

      - name: Build Token Contract
        run: |
          cd contracts/token
          stellar contract build

      - name: Build Staking Contract
        run: |
          cd contracts/staking
          stellar contract build

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: test-contracts
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          cd frontend
          npm install

      - name: Build frontend
        run: |
          cd frontend
          npm run build